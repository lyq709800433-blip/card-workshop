<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡牌对战桌游 - 创意工坊 v4</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:#1a1a2e;color:#e0d6c2;min-height:100vh}
header{background:#16213e;border-bottom:2px solid #c9a84c;padding:16px 24px;display:flex;align-items:center;gap:16px}
header h1{font-size:1.5em;color:#c9a84c;letter-spacing:2px}
header .sub{color:#8a8a9a;font-size:0.85em}
nav{display:flex;gap:4px;background:#16213e;padding:0 24px;border-bottom:1px solid #2a2a4a;overflow-x:auto}
nav button{padding:12px 20px;background:none;border:none;color:#8a8a9a;cursor:pointer;font-size:0.95em;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
nav button:hover{color:#c9a84c}
nav button.active{color:#c9a84c;border-bottom-color:#c9a84c}
main{padding:24px;max-width:1200px;margin:0 auto}
.tab{display:none}
.tab.active{display:block}
h2{color:#c9a84c;margin-bottom:20px;font-size:1.2em;display:flex;align-items:center;gap:10px}
h2::before{content:'';display:inline-block;width:4px;height:20px;background:#c9a84c;border-radius:2px}
.btn{background:#c9a84c;color:#1a1a2e;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:0.9em;font-weight:600;transition:all .2s}
.btn:hover{background:#dbb95c}
.btn-sm{padding:5px 12px;font-size:0.8em}
.btn-outline{background:transparent;border:1px solid #c9a84c;color:#c9a84c}
.btn-outline:hover{background:#c9a84c20}
.btn-danger{background:#8b3a3a;color:#e0d6c2}
.btn-danger:hover{background:#a04545}
.btn-success{background:#2d8a4e;color:#e0d6c2}
.btn-success:hover{background:#37a05e}
.input-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
input,select,textarea{background:#1e1e3a;border:1px solid #3a3a5a;color:#e0d6c2;padding:8px 12px;border-radius:6px;font-size:0.9em;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#c9a84c}
input[type=number]{width:80px}
textarea{resize:vertical;min-height:60px;width:100%}
.field{margin-bottom:12px}
.field label{display:block;margin-bottom:4px;color:#8a8a9a;font-size:0.85em}
.field .hint{font-size:0.75em;color:#5a5a7a;margin-top:2px}
.field input,.field select,.field textarea{width:100%}
.field input[type=number]{width:100%}
.stats-row{display:flex;gap:12px}
.stats-row .field{flex:1}
.list-item{background:#1e1e3a;border:1px solid #2a2a4a;border-radius:8px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;transition:all .2s}
.list-item:hover{border-color:#c9a84c40}
.list-item .info strong{display:block;margin-bottom:4px}
.list-item .info span{font-size:0.8em;color:#6a6a8a}
.list-item .actions{display:flex;gap:6px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.75em;font-weight:600}
.badge-combat{background:#c9a84c20;color:#c9a84c;border:1px solid #c9a84c40}
.badge-lord{background:#9b59b620;color:#9b59b6;border:1px solid #9b59b640}
.badge-level{background:#e67e2220;color:#e67e22;border:1px solid #e67e2240}
.badge-cp{background:#3498db20;color:#3498db;border:1px solid #3498db40}
.badge-normal{background:#5a5a7a20;color:#5a5a7a;border:1px solid #5a5a7a40}
.empty-state{text-align:center;padding:40px;color:#5a5a7a}
.empty-state .icon{font-size:2.5em;margin-bottom:12px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card-preview{background:#1e1e3a;border:1px solid #2a2a4a;border-radius:8px;padding:16px;cursor:pointer;transition:all .2s;position:relative;min-height:120px}
.card-preview:hover{border-color:#c9a84c;transform:translateY(-2px)}
.card-preview.lord{border-color:#9b59b640;background:linear-gradient(135deg,#1e1e3a 0%,#2a1a3a 100%)}
.card-preview .card-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .2s;z-index:2}
.card-preview:hover .card-actions{opacity:1}
.card-preview .card-name{font-size:1.1em;font-weight:700;margin-bottom:6px;padding-right:60px;display:flex;align-items:center;gap:8px}
.card-preview .card-type{color:#c9a84c;font-size:0.8em;margin-bottom:4px}
.card-preview .card-faction{color:#6a6a8a;font-size:0.8em;margin-bottom:8px}
.card-stats{display:flex;gap:8px;margin:8px 0}
.card-stats .stat{flex:1;text-align:center;background:#16213e;border-radius:6px;padding:6px 4px}
.card-stats .stat .label{display:block;font-size:0.7em;color:#6a6a8a}
.card-stats .stat .value{font-size:1.2em;font-weight:700;color:#e0d6c2}
.card-stats .stat.atk .value{color:#e74c3c}
.card-stats .stat.hp .value{color:#2ecc71}
.card-stats .stat.def .value{color:#3498db}
.card-stats .stat.level .value{color:#e67e22}
.card-stats .stat.cp .value{color:#3498db;font-size:1.1em}
.card-keywords{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
.card-keywords .kw{display:inline-block;padding:2px 8px;background:#c9a84c15;border:1px solid #c9a84c30;border-radius:10px;font-size:0.75em;color:#c9a84c;white-space:nowrap}
.card-desc{color:#6a6a8a;font-size:0.8em;line-height:1.5;margin-top:6px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filters select,.filters input{width:auto;min-width:140px}
.export-bar{display:flex;gap:8px;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid #2a2a4a;flex-wrap:wrap}
.modal-overlay{position:fixed;inset:0;background:#000000cc;display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .2s}
.modal{background:#1a1a2e;border:1px solid #3a3a5a;border-radius:12px;padding:24px;width:94%;max-width:520px;max-height:90vh;overflow-y:auto;animation:slideUp .25s}
.modal h3{color:#c9a84c;margin-bottom:16px;font-size:1.1em}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{background:#2a2a4a;color:#e0d6c2;padding:10px 18px;border-radius:8px;font-size:0.9em;animation:slideIn .3s ease;max-width:320px;box-shadow:0 4px 16px #00000040}
.toast.error{background:#8b3a3a;border-left:3px solid #e74c3c}
.help-tip{font-size:0.75em;color:#6a6a8a;margin-top:4px;font-style:italic}
.sync-dot{transition:color .3s}
.sync-label{font-size:0.7em;color:#6a6a8a}
.autosync-banner{background:#3498db20;border:1px solid #3498db40;border-radius:8px;padding:14px 18px;margin-bottom:16px;color:#e0d6c2;font-size:0.85em;line-height:1.6;display:none}
.autosync-banner.show{display:block}
.autosync-banner code{background:#16213e;padding:2px 6px;border-radius:4px;font-size:0.95em}
.autosync-banner.warn{background:#e67e2220;border-color:#e67e2240;color:#e67e22}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@media(max-width:640px){
  .card-grid{grid-template-columns:1fr}
  .filters{flex-direction:column}
  .filters select,.filters input{width:100%}
  header{padding:12px 16px}
  main{padding:12px}
}</style>
</head>
<body>

<header>
  <h1>&#9876; 卡牌对战桌游</h1>
  <span class="sub">创意工坊 v4 &mdash; 自动云同步</span>
  <span style="margin-left:auto;display:flex;align-items:center;gap:6px">
    <span id="sync-label" class="sync-label"></span>
    <span id="sync-dot" class="sync-dot" style="font-size:1.3em;cursor:pointer;letter-spacing:2px">&#9679;</span>
  </span>
</header>
<nav>
  <button data-tab="factions" class="active" onclick="switchTab('factions')">&#127984; 阵营</button>
  <button data-tab="types" onclick="switchTab('types')">&#128203; 卡牌类型</button>
  <button data-tab="cards" onclick="switchTab('cards')">&#127149; 创意工坊</button>
</nav>
<main>
  <div id="autosync-banner" class="autosync-banner"></div>
  <div id="tab-factions" class="tab active">
    <h2>阵营管理</h2>
    <div class="input-row">
      <input id="faction-input" placeholder="新阵营名称..." style="flex:1">
      <button class="btn" onclick="addFaction()">+ 添加</button>
    </div>
    <div id="faction-list"></div>
  </div>
  <div id="tab-types" class="tab">
    <h2>卡牌类型管理</h2>
    <div class="help-tip">&#9733; 战斗单位：含攻击/生命/等级  &middot; 领主：含生命/防御/魔力值  &middot; 普通：仅描述和关键词</div>
    <div class="input-row">
      <input id="type-input" placeholder="类型名称..." style="flex:1">
      <select id="type-category">
        <option value="normal">&#128196; 普通卡牌</option>
        <option value="combat">&#128165; 战斗单位 (攻/生/等级)</option>
        <option value="lord">&#128081; 领主 (生命/防御/魔力值)</option>
      </select>
      <button class="btn" onclick="addType()">+ 添加</button>
    </div>
    <div id="type-list"></div>
  </div>
  <div id="tab-cards" class="tab">
    <h2>创意工坊</h2>
    <div class="filters">
      <select id="filter-faction" onchange="renderCards()"><option value="">全部阵营</option></select>
      <select id="filter-type" onchange="renderCards()"><option value="">全部类型</option></select>
      <input id="filter-search" placeholder="&#128269; 搜索卡牌名称..." oninput="renderCards()">
      <button class="btn" onclick="openCardModal()">+ 新建卡牌</button>
    </div>
    <div id="card-grid" class="card-grid"></div>
    <div class="export-bar">
      <button class="btn btn-outline btn-sm" onclick="exportData()">&#128230; 导出</button>
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('import-file').click()">&#128229; 导入</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</main>
<div id="modal-container"></div>
<div id="toast-container"></div>
<script>
var SK='cardgame_data_v3',GID='fd8b0ddd1a2d003457d9a38098399bd0';
var GURL='https://gist.githubusercontent.com/lyq709800433-blip/'+GID+'/raw/data.json';
var API='https://api.github.com/gists/'+GID;
var data={factions:[],cardTypes:[],cards:[]};
var editId=null,fileProto=location.protocol==='file:';
var syncTmr=null,LKH='';

function hsh(d){var s=JSON.stringify({factions:d.factions,cardTypes:d.cardTypes,cards:d.cards});var h=0,i=0;for(;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return h.toString(36);}
function ld(){
  try{
    var r=localStorage.getItem(SK);
    if(!r){r=localStorage.getItem('cardgame_data_v2');if(r)localStorage.setItem(SK,r);}
    if(r)data=JSON.parse(r);
    if(!data.factions)data.factions=[];
    if(!data.cardTypes)data.cardTypes=[];
    if(!data.cards)data.cards=[];
    for(var i=0;i<data.cardTypes.length;i++){var t=data.cardTypes[i];if(!t.category){t.category=t.isCombat?'combat':'normal';delete t.isCombat;}}
    for(var j=0;j<data.cards.length;j++){var c=data.cards[j];if(!c.keywords)c.keywords='';if(c.defense===undefined)c.defense=0;if(c.level===undefined)c.level=1;if(c.cp===undefined)c.cp=0;}
    sv(false);
  }catch(e){data={factions:[],cardTypes:[],cards:[]};}
}
function sv(trig){localStorage.setItem(SK,JSON.stringify(data));if(trig!==false)sch();}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function toast(m,e){var el=document.createElement('div');el.className='toast'+(e?' error':'');el.textContent=m;document.getElementById('toast-container').appendChild(el);setTimeout(function(){el.remove();},2500);}

// === Sync Engine ===
function gt(){return localStorage.getItem('gist_token')||'';}
function sdot(s){
  var d=document.getElementById('sync-dot'),l=document.getElementById('sync-label');
  if(!d)return;
  switch(s){
    case'S':d.style.color='#f0a500';l.textContent='\u540c\u6b65\u4e2d';break;
    case'K':d.style.color='#4ecdc4';l.textContent='\u5df2\u540c\u6b65';break;
    case'P':d.style.color='#f0a500';l.textContent='\u5f85\u540c\u6b65';break;
    case'E':d.style.color='#e74c3c';l.textContent='\u5931\u8d25';break;
    case'F':d.style.color='#e74c3c';l.textContent='file:// \u4e0d\u53ef\u7528';break;
    default:d.style.color='#666';l.textContent='\u4e91\u540c\u6b65(\u70b9\u51fb\u8bbe\u7f6e)';break;
  }
}
function sch(){if(fileProto){sdot('F');return;}var t=gt();if(!t){sdot('N');return;}clearTimeout(syncTmr);sdot('P');syncTmr=setTimeout(push,1500);}
function push(){
  var t=gt();if(!t||fileProto)return;sdot('S');
  var p=JSON.stringify({factions:data.factions,cardTypes:data.cardTypes,cards:data.cards});
  fetch(API,{method:'PATCH',headers:{'Authorization':'Bearer '+t,'Accept':'application/vnd.github+json','Content-Type':'application/json','X-GitHub-Api-Version':'2022-11-28'},body:JSON.stringify({files:{'data.json':{content:p}}})})
    .then(function(r){return r.json().then(function(j){return{st:r.status,js:j};});})
    .then(function(r){if(r.st>=200&&r.st<300){LKH=hsh(data);sdot('K');localStorage.setItem('gist_ls',new Date().toLocaleString('zh-CN'));}else{sdot('E');console.log('Push err:',r.st,r.js.message);}})
    .catch(function(e){sdot('E');console.log('Push ex:',e.message);});
}
function pull(){
  var t=gt();if(fileProto){sdot('F');showBanner('warn','\u26a0\ufe0f \u5f53\u524d\u4ee5 file:// \u534f\u8bae\u6253\u5f00\uff0c\u65e0\u6cd5\u4f7f\u7528\u4e91\u540c\u6b65\u3002<br>\u8bf7\u53cc\u51fb\u8fd0\u884c <code>start-server.bat</code>\uff0c\u7136\u540e\u8bbf\u95ee <code>http://localhost:8765/card-workshop.html</code>');return;}
  if(!t){sdot('N');showBanner('info','\ud83d\udd11 \u70b9\u51fb\u53f3\u4e0a\u89d2 \u25cf \u8bbe\u7f6e GitHub Token \u4ee5\u542f\u7528\u81ea\u52a8\u4e91\u540c\u6b65');return;}
  hideBanner();sdot('S');
  fetch(GURL+'?t='+Date.now(),{cache:'no-store'}).then(function(r){return r.json();}).then(function(cld){
    if(!cld.factions||!cld.cardTypes||!cld.cards){sdot('K');return;}
    var ch=hsh(cld),lh=hsh(data);
    if(ch===lh){LKH=ch;sdot('K');return;}
    if(ch===LKH&&lh!==LKH){sdot('P');return;}
    data.factions=cld.factions||[];data.cardTypes=cld.cardTypes||[];data.cards=cld.cards||[];
    LKH=ch;localStorage.setItem(SK,JSON.stringify(data));
    renderFactions();renderTypes();renderCards();refreshFilters();sdot('K');
    localStorage.setItem('gist_ls',new Date().toLocaleString('zh-CN'));
    toast('\u21bb \u5df2\u4ece\u4e91\u7aef\u540c\u6b65\u6700\u65b0\u6570\u636e');
  }).catch(function(e){sdot('E');console.log('Pull err:',e.message);});
}
function onDot(){
  var t=gt();
  var n=prompt('\ud83d\udd11 \u4e91\u540c\u6b65\u8bbe\u7f6e\n\n'+(t?'\u5f53\u524d\u5df2\u8bbe\u7f6e Token\u3002\u8f93\u5165\u65b0 Token \u66ff\u6362\uff0c\u7559\u7a7a\u6e05\u9664\u3002':'\u9996\u6b21\u4f7f\u7528\u8bf7\u8f93\u5165 GitHub Token\uff08\u9700\u8981 gist \u6743\u9650\uff09\uff1a')+'\n\n\u524d\u5f80 https://github.com/settings/tokens \u751f\u6210',t||'');
  if(n===null)return;
  if(n.trim()){localStorage.setItem('gist_token',n.trim());toast('\u2705 Token \u5df2\u4fdd\u5b58');pull();}
  else if(t){localStorage.removeItem('gist_token');sdot('N');toast('\u2139\ufe0f Token \u5df2\u6e05\u9664');showBanner('info','\ud83d\udd11 \u70b9\u51fb\u53f3\u4e0a\u89d2 \u25cf \u8bbe\u7f6e GitHub Token \u4ee5\u542f\u7528\u81ea\u52a8\u4e91\u540c\u6b65');}
}
function showBanner(tp,html){var b=document.getElementById('autosync-banner');b.className='autosync-banner show'+(tp==='warn'?' warn':'');b.innerHTML=html;}
function hideBanner(){document.getElementById('autosync-banner').className='autosync-banner';}

// === Factions ===
function renderFactions(){
  var l=document.getElementById('faction-list');
  if(!data.factions.length){l.innerHTML='<div class="empty-state"><div class="icon">&#127984;</div><p>\u8fd8\u6ca1\u6709\u9635\u8425\uff0c\u521b\u5efa\u4e00\u4e2a\u5427</p></div>';return;}
  l.innerHTML=data.factions.map(function(f){return'<div class="list-item"><div class="info"><strong>'+esc(f.name)+'</strong><span>'+gfcc(f.id)+' \u5f20\u5361\u724c</span></div><div class="actions"><button class="btn btn-outline btn-sm" onclick="renameFaction(\''+f.id+'\')">&#9998; \u91cd\u547d\u540d</button><button class="btn btn-danger btn-sm" onclick="deleteFaction(\''+f.id+'\')">&#128465; \u5220\u9664</button></div></div>';}).join('');}
function addFaction(){
  var i=document.getElementById('faction-input'),n=i.value.trim();
  if(!n)return toast('\u8bf7\u8f93\u5165\u9635\u8425\u540d\u79f0',true);
  if(data.factions.some(function(f){return f.name===n;}))return toast('\u9635\u8425\u540d\u79f0\u5df2\u5b58\u5728',true);
  data.factions.push({id:uid(),name:n});sv();i.value='';renderFactions();refreshFilters();toast('&#127984; \u9635\u8425\u300c'+n+'\u300d\u5df2\u6dfb\u52a0');}
function renameFaction(id){
  var f=data.factions.find(function(x){return x.id===id;});if(!f)return;
  var n=prompt('\u4fee\u6539\u9635\u8425\u540d\u79f0\uff1a',f.name);if(!n||!n.trim())return;
  if(data.factions.some(function(x){return x.name===n.trim()&&x.id!==id;}))return toast('\u9635\u8425\u540d\u79f0\u5df2\u5b58\u5728',true);
  f.name=n.trim();sv();renderFactions();refreshFilters();renderCards();toast('\u9635\u8425\u5df2\u66f4\u65b0');}
function deleteFaction(id){
  var f=data.factions.find(function(x){return x.id===id;});if(!f)return;
  if(!confirm('\u5220\u9664\u9635\u8425\u300c'+f.name+'\u300d\uff1f\u8be5\u9635\u8425\u4e0b\u7684\u5361\u724c\u4e0d\u4f1a\u5220\u9664\uff0c\u4f46\u4f1a\u5931\u53bb\u9635\u8425\u5f52\u5c5e\u3002'))return;
  data.factions=data.factions.filter(function(x){return x.id!==id;});sv();renderFactions();refreshFilters();renderCards();toast('\u9635\u8425\u5df2\u5220\u9664');}
function gfcc(fid){return data.cards.filter(function(c){return c.factionId===fid;}).length;}

// === Types ===
function renderTypes(){
  var l=document.getElementById('type-list');
  if(!data.cardTypes.length){l.innerHTML='<div class="empty-state"><div class="icon">&#128203;</div><p>\u8fd8\u6ca1\u6709\u5361\u724c\u7c7b\u578b\uff0c\u521b\u5efa\u51e0\u4e2a\u5427</p></div>';return;}
  l.innerHTML=data.cardTypes.map(function(t){
    var lb='';if(t.category==='combat')lb='<span class="badge badge-combat">&#128165; \u6218\u6597\u5355\u4f4d</span>';else if(t.category==='lord')lb='<span class="badge badge-lord">&#128081; \u9886\u4e3b</span>';else lb='<span class="badge badge-normal">&#128196; \u666e\u901a</span>';
    return'<div class="list-item"><div class="info"><strong>'+esc(t.name)+'</strong><span>'+lb+' &middot; '+gtcc(t.id)+' \u5f20\u5361\u724c</span></div><div class="actions"><button class="btn btn-outline btn-sm" onclick="editType(\''+t.id+'\')">&#9998;</button><button class="btn btn-danger btn-sm" onclick="deleteType(\''+t.id+'\')">&#128465;</button></div></div>';}).join('');}
function addType(){
  var i=document.getElementById('type-input'),n=i.value.trim(),cat=document.getElementById('type-category').value;
  if(!n)return toast('\u8bf7\u8f93\u5165\u7c7b\u578b\u540d\u79f0',true);
  if(data.cardTypes.some(function(t){return t.name===n;}))return toast('\u7c7b\u578b\u540d\u79f0\u5df2\u5b58\u5728',true);
  data.cardTypes.push({id:uid(),name:n,category:cat});sv();i.value='';renderTypes();refreshFilters();toast('\u7c7b\u578b\u300c'+n+'\u300d\u5df2\u6dfb\u52a0');}
function editType(id){
  var t=data.cardTypes.find(function(x){return x.id===id;});if(!t)return;
  var n=prompt('\u4fee\u6539\u7c7b\u578b\u540d\u79f0\uff1a',t.name);if(!n||!n.trim())return;
  if(data.cardTypes.some(function(x){return x.name===n.trim()&&x.id!==id;}))return toast('\u7c7b\u578b\u540d\u79f0\u5df2\u5b58\u5728',true);
  t.name=n.trim();
  var cs=prompt('\u4fee\u6539\u5361\u724c\u7c7b\u522b\uff1a\nnormal=\u666e\u901a | combat=\u6218\u6597\u5355\u4f4d | lord=\u9886\u4e3b',t.category||'normal');
  if(cs&&(cs==='normal'||cs==='combat'||cs==='lord'))t.category=cs;
  sv();renderTypes();refreshFilters();renderCards();toast('\u7c7b\u578b\u5df2\u66f4\u65b0');}
function deleteType(id){
  var t=data.cardTypes.find(function(x){return x.id===id;});if(!t)return;
  if(!confirm('\u5220\u9664\u7c7b\u578b\u300c'+t.name+'\u300d\uff1f\u8be5\u7c7b\u578b\u4e0b\u7684\u5361\u724c\u4e0d\u4f1a\u5220\u9664\uff0c\u4f46\u4f1a\u5931\u53bb\u7c7b\u578b\u5f52\u5c5e\u3002'))return;
  data.cardTypes=data.cardTypes.filter(function(x){return x.id!==id;});sv();renderTypes();refreshFilters();renderCards();toast('\u7c7b\u578b\u5df2\u5220\u9664');}
function gtcc(tid){return data.cards.filter(function(c){return c.typeId===tid;}).length;}

// === Cards ===
function renderCards(){
  var g=document.getElementById('card-grid'),cds=data.cards.slice();
  var ff=document.getElementById('filter-faction').value,ft=document.getElementById('filter-type').value,fs=document.getElementById('filter-search').value.toLowerCase();
  if(ff)cds=cds.filter(function(c){return c.factionId===ff;});
  if(ft)cds=cds.filter(function(c){return c.typeId===ft;});
  if(fs)cds=cds.filter(function(c){return c.name.toLowerCase().indexOf(fs)!==-1;});
  cds.sort(function(a,b){var ta=gcc(a),tb=gcc(b),o={lord:0,combat:1,normal:2};return(o[ta]||0)-(o[tb]||0);});
  if(!cds.length){g.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="icon">&#127149;</div><p>\u8fd8\u6ca1\u6709\u7b26\u5408\u6761\u4ef6\u7684\u5361\u724c</p></div>';return;}
  g.innerHTML=cds.map(function(c){
    var fac=data.factions.find(function(f){return f.id===c.factionId;}),tp=data.cardTypes.find(function(t){return t.id===c.typeId;});
    var cat=tp?(tp.category||'normal'):'normal',isL=cat==='lord',isC=cat==='combat';
    var sh='';
    if(isC){var ls='',lv=c.level||1;for(var s=0;s<Math.min(lv,5);s++)ls+='&#9733;';sh='<div class="card-stats"><div class="stat atk"><span class="label">&#9876; \u653b\u51fb</span><span class="value">'+(c.attack||0)+'</span></div><div class="stat hp"><span class="label">&#10084; \u751f\u547d</span><span class="value">'+(c.hp||0)+'</span></div><div class="stat level"><span class="label">&#11088; \u7b49\u7ea7</span><span class="value">'+ls+'</span></div></div>';}
    else if(isL){sh='<div class="card-stats"><div class="stat hp"><span class="label">&#10084; \u751f\u547d</span><span class="value">'+(c.hp||0)+'</span></div><div class="stat def"><span class="label">&#128737; \u9632\u5fa1</span><span class="value">'+(c.defense||0)+'</span></div><div class="stat cp"><span class="label">&#10024; \u9b54\u529b\u503c</span><span class="value">CP+'+(c.cp||0)+'</span></div></div>';}
    var kh='';if(c.keywords&&c.keywords.trim()){kh='<div class="card-keywords">'+c.keywords.split(/[,;\uff0c\uff1b\u3001\s]+/).filter(function(k){return k;}).map(function(k){return'<span class="kw">'+esc(k)+'</span>';}).join('')+'</div>';}
    var bd='';if(isC&&(c.level||1)>=3)bd='<span class="badge badge-level" style="margin-left:4px">Lv.'+(c.level||1)+'</span>';else if(isL&&(c.cp||0)>0)bd='<span class="badge badge-cp" style="margin-left:4px">CP+'+(c.cp||0)+'</span>';
    return'<div class="card-preview'+(isL?' lord':'')+'" onclick="openCardModal(\''+c.id+'\')"><div class="card-actions"><button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openCardModal(\''+c.id+'\')">&#9998;</button><button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteCard(\''+c.id+'\')">&#128465;</button></div><div class="card-name">'+esc(c.name)+bd+'</div><div class="card-type">'+(tp?esc(tp.name):'\u672a\u77e5')+'</div><div class="card-faction">&#127984; '+(fac?esc(fac.name):'\u65e0\u9635\u8425')+'</div>'+sh+kh+'<div class="card-desc">'+esc(c.desc||'\uff08\u65e0\u63cf\u8ff0\uff09')+'</div></div>';}).join('');}
function gcc(cd){var tp=data.cardTypes.find(function(t){return t.id===cd.typeId;});return tp?(tp.category||'normal'):'normal';}
function openCardModal(id){
  editId=id||null;var card=id?data.cards.find(function(c){return c.id===id;}):null;
  var fo=data.factions.map(function(f){return'<option value="'+f.id+'"'+(card&&card.factionId===f.id?' selected':'')+'>'+esc(f.name)+'</option>';}).join('');
  var to=data.cardTypes.map(function(t){var em='';if(t.category==='combat')em=' &#9876;';else if(t.category==='lord')em=' &#128081;';return'<option value="'+t.id+'"'+(card&&card.typeId===t.id?' selected':'')+'>'+esc(t.name)+em+'</option>';}).join('');
  document.getElementById('modal-container').innerHTML='<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>'+(card?'&#9998; \u7f16\u8f91\u5361\u724c':'&#10024; \u65b0\u5efa\u5361\u724c')+'</h3><div class="field"><label>&#128219; \u5361\u724c\u540d\u79f0 *</label><input id="card-name" value="'+ea(card?card.name:'')+'" placeholder="\u8f93\u5165\u5361\u724c\u540d\u79f0..."></div><div class="field"><label>&#127984; \u9635\u8425</label><select id="card-faction"><option value="">\u65e0\u9635\u8425</option>'+fo+'</select></div><div class="field"><label>&#128194; \u5361\u724c\u7c7b\u578b *</label><select id="card-type" onchange="onTypeChange()"><option value="">&mdash; \u9009\u62e9\u7c7b\u578b &mdash;</option>'+to+'</select></div><div id="card-stats-area"></div><div class="field"><label>&#127991; \u5173\u952e\u8bcd</label><input id="card-keywords" placeholder="\u7528\u9017\u53f7\u3001\u5206\u53f7\u6216\u7a7a\u683c\u5206\u9694\uff0c\u5982\uff1a\u5723\u76fe,\u8fde\u51fb,\u98de\u884c" value="'+ea(card?card.keywords||'':'')+'"><div class="hint">\u652f\u6301\u591a\u4e2a\u5173\u952e\u8bcd\uff0c\u81ea\u5b9a\u4e49\u6dfb\u52a0</div></div><div class="field"><label>&#128221; \u5361\u724c\u63cf\u8ff0</label><textarea id="card-desc" placeholder="\u8f93\u5165\u5361\u724c\u6548\u679c\u63cf\u8ff0...">'+ea(card?card.desc||'':'')+'</textarea></div><div class="actions"><button class="btn btn-outline" onclick="closeModal()">\u53d6\u6d88</button><button class="btn btn-success" onclick="saveCard()">'+(card?'&#9989; \u4fdd\u5b58\u4fee\u6539':'&#10024; \u521b\u5efa\u5361\u724c')+'</button></div></div></div>';onTypeChange();}
function onTypeChange(){
  var tid=document.getElementById('card-type').value,t=data.cardTypes.find(function(x){return x.id===tid;});
  var card=editId?data.cards.find(function(c){return c.id===editId;}):null,a=document.getElementById('card-stats-area');
  if(!t){a.innerHTML='';return;}
  if(t.category==='combat'){a.innerHTML='<div class="stats-row"><div class="field"><label>&#9876; \u653b\u51fb\u529b</label><input id="card-attack" type="number" min="0" value="'+(card?(card.attack||0):0)+'"></div><div class="field"><label>&#10084; \u751f\u547d\u503c</label><input id="card-hp" type="number" min="1" value="'+(card?(card.hp||1):1)+'"></div><div class="field"><label>&#11088; \u7b49\u7ea7</label><input id="card-level" type="number" min="1" max="10" value="'+(card?(card.level||1):1)+'"><div class="hint">Lv3+ \u53ef\u80fd\u9700\u8981\u7d20\u6750\u53ec\u5524</div></div></div>';}
  else if(t.category==='lord'){a.innerHTML='<div class="stats-row"><div class="field"><label>&#10084; \u751f\u547d\u503c</label><input id="card-hp" type="number" min="1" value="'+(card?(card.hp||1):1)+'"></div><div class="field"><label>&#128737; \u9632\u5fa1\u503c</label><input id="card-defense" type="number" min="0" value="'+(card?(card.defense||0):0)+'"></div><div class="field"><label>&#10024; \u9b54\u529b\u503c(CP)</label><input id="card-cp" type="number" min="0" max="10" value="'+(card?(card.cp||0):0)+'"><div class="hint">\u6bcf\u56de\u5408\u751f\u6210\u7684\u6307\u6325\u70b9\u6570</div></div></div>';}
  else{a.innerHTML='';}}
function saveCard(){
  var nm=document.getElementById('card-name').value.trim(),fid=document.getElementById('card-faction').value,tid=document.getElementById('card-type').value;
  var desc=document.getElementById('card-desc').value.trim(),kw=document.getElementById('card-keywords').value.trim();
  if(!nm)return toast('\u8bf7\u8f93\u5165\u5361\u724c\u540d\u79f0',true);if(!tid)return toast('\u8bf7\u9009\u62e9\u5361\u724c\u7c7b\u578b',true);
  var tp=data.cardTypes.find(function(t){return t.id===tid;}),cat=tp?(tp.category||'normal'):'normal';
  var cd={id:editId||uid(),name:nm,factionId:fid||null,typeId:tid,desc:desc,keywords:kw,attack:0,hp:0,defense:0,level:1,cp:0,
    createdAt:editId?((data.cards.find(function(c){return c.id===editId;})||{}).createdAt||new Date().toISOString()):new Date().toISOString()};
  if(cat==='combat'){cd.attack=parseInt(document.getElementById('card-attack').value)||0;cd.hp=parseInt(document.getElementById('card-hp').value)||1;cd.level=parseInt(document.getElementById('card-level').value)||1;}
  else if(cat==='lord'){cd.hp=parseInt(document.getElementById('card-hp').value)||1;cd.defense=parseInt(document.getElementById('card-defense').value)||0;cd.cp=parseInt(document.getElementById('card-cp').value)||0;}
  if(editId){var idx=-1;for(var i=0;i<data.cards.length;i++){if(data.cards[i].id===editId){idx=i;break;}}if(idx>=0)data.cards[idx]=cd;}
  else{data.cards.push(cd);}
  sv();closeModal();renderCards();renderFactions();renderTypes();toast(editId?'&#9989; \u5361\u724c\u5df2\u66f4\u65b0':'&#10024; \u5361\u724c\u300c'+nm+'\u300d\u5df2\u521b\u5efa');}
function deleteCard(id){
  var c=data.cards.find(function(x){return x.id===id;});if(!c)return;
  if(!confirm('\u5220\u9664\u5361\u724c\u300c'+c.name+'\u300d\uff1f\u6b64\u64cd\u4f5c\u4e0d\u53ef\u6062\u590d\u3002'))return;
  data.cards=data.cards.filter(function(x){return x.id!==id;});sv();renderCards();renderFactions();renderTypes();toast('&#128465; \u5361\u724c\u5df2\u5220\u9664');}
function closeModal(){document.getElementById('modal-container').innerHTML='';editId=null;}

function refreshFilters(){
  var ff=document.getElementById('filter-faction'),ft=document.getElementById('filter-type'),fsv=ff.value,tsv=ft.value;
  ff.innerHTML='<option value="">\u5168\u90e8\u9635\u8425</option>'+data.factions.map(function(f){return'<option value="'+f.id+'">'+esc(f.name)+'</option>';}).join('');
  ft.innerHTML='<option value="">\u5168\u90e8\u7c7b\u578b</option>'+data.cardTypes.map(function(t){return'<option value="'+t.id+'">'+esc(t.name)+'</option>';}).join('');
  ff.value=fsv;ft.value=tsv;}

function exportData(){
  var b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='cardgame-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(u);toast('&#128230; \u6570\u636e\u5df2\u5bfc\u51fa');}
function importData(e){
  var f=e.target.files[0];if(!f)return;var r=new FileReader();
  r.onload=function(ev){
    try{var im=JSON.parse(ev.target.result);if(!im.factions||!im.cardTypes||!im.cards)return toast('\u6587\u4ef6\u683c\u5f0f\u4e0d\u6b63\u786e',true);
    if(!confirm('&#128229; \u5bfc\u5165\u5c06\u8986\u76d6\u5f53\u524d\u6240\u6709\u6570\u636e\uff0c\u786e\u8ba4\u7ee7\u7eed\uff1f'))return;
    data=im;for(var i=0;i<data.cardTypes.length;i++){var t=data.cardTypes[i];if(!t.category){t.category=t.isCombat?'combat':'normal';delete t.isCombat;}}
    for(var j=0;j<data.cards.length;j++){var c=data.cards[j];if(!c.keywords)c.keywords='';if(c.defense===undefined)c.defense=0;if(c.level===undefined)c.level=1;if(c.cp===undefined)c.cp=0;}
    sv();renderFactions();renderTypes();renderCards();refreshFilters();toast('&#9989; \u5bfc\u5165\u6210\u529f\uff01'+data.factions.length+'\u9635\u8425 '+data.cardTypes.length+'\u7c7b\u578b '+data.cards.length+'\u5361\u724c');
    }catch(err){toast('&#10060; \u6587\u4ef6\u89e3\u6790\u5931\u8d25',true);}};
  r.readAsText(f);e.target.value='';}

function switchTab(tab){
  var ts=document.querySelectorAll('.tab'),bs=document.querySelectorAll('nav button');
  for(var i=0;i<ts.length;i++)ts[i].classList.remove('active');
  for(var j=0;j<bs.length;j++)bs[j].classList.remove('active');
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelector('nav button[data-tab="'+tab+'"]').classList.add('active');}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function ea(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

document.getElementById('sync-dot').addEventListener('click',onDot);
ld();renderFactions();renderTypes();renderCards();refreshFilters();pull();
</script>
</body>
</html>
